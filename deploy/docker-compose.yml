services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TOKEN}
    networks:
      - internal

  nginx:
    build:
      context: .         # ~ (홈 디렉토리)
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - internal

networks:
  internal:
    driver: bridge
